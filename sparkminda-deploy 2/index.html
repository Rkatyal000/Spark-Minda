<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark Minda – AI Policy Assistant</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: 'Barlow', sans-serif; background: #0F1E35; }
    @keyframes dotBounce  { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-7px)} }
    @keyframes fadeUp     { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideIn    { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    @keyframes pulse      { 0%,100%{opacity:1} 50%{opacity:.5} }
    ::-webkit-scrollbar        { width: 4px; }
    ::-webkit-scrollbar-track  { background: transparent; }
    ::-webkit-scrollbar-thumb  { background: #2d4a70; border-radius: 10px; }
    textarea:focus { outline: none; }
    .cat-tab          { transition: all .2s; }
    .cat-tab:hover    { background: rgba(255,255,255,.08) !important; }
    .cat-tab.active   { background: rgba(249,115,22,.15) !important; border-color: #F97316 !important; color: #F97316 !important; }
    .upload-zone:hover{ border-color: #F97316 !important; background: rgba(249,115,22,.05) !important; }
    .send-btn:hover:not(:disabled){ background: linear-gradient(135deg,#ea6a0a,#f97316) !important; box-shadow: 0 4px 16px rgba(249,115,22,.5) !important; }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const CATEGORIES = [
  { id: "hr",         label: "HR & Leave",    icon: "👥", color: "#3B82F6" },
  { id: "sop",        label: "SOPs",          icon: "📋", color: "#8B5CF6" },
  { id: "compliance", label: "Compliance",    icon: "⚖️",  color: "#10B981" },
  { id: "it",         label: "IT & Security", icon: "🔒", color: "#F59E0B" },
];

const SYSTEM_PROMPT = `You are the Spark Minda AI Policy Assistant — an authoritative internal HR and compliance chatbot.

You have been provided with official Spark Minda policy documents. Your job is to answer employee questions ONLY based on the content of these uploaded documents.

RULES:
1. Answer ONLY from the provided document context. Do not use general knowledge.
2. If the answer isn't in the documents, say: "This information isn't found in the uploaded policy documents. Please contact HR directly or refer to the official document."
3. Always cite which document/section you're referencing when possible.
4. Be professional, concise, and clear. Use bullet points for multi-part answers.
5. Never speculate or fabricate policy details.
6. If multiple documents are relevant, synthesize them clearly.`;

const WELCOME = `Namaste! 👋 I'm the Spark Minda Policy Assistant.

Upload your policy PDFs in the left panel, then ask me anything — I'll answer directly from your documents.

I can help with:
• HR & Leave policies
• SOPs and procedures
• Compliance guidelines
• IT & Security policies`;

/* ── Typing Indicator ── */
function TypingDots() {
  return (
    <div style={{display:"flex",gap:5,padding:"2px 0",alignItems:"center"}}>
      {[0,1,2].map(i=>(
        <span key={i} style={{
          width:7,height:7,borderRadius:"50%",background:"#F97316",display:"inline-block",
          animation:`dotBounce 1.2s ease-in-out ${i*.18}s infinite`,
        }}/>
      ))}
    </div>
  );
}

/* ── Badge ── */
function Badge({label,color}) {
  return (
    <span style={{
      fontSize:10,fontFamily:"'Barlow',sans-serif",fontWeight:600,
      padding:"2px 7px",borderRadius:20,
      background:color+"22",color,border:`1px solid ${color}44`,
      letterSpacing:.5,textTransform:"uppercase",whiteSpace:"nowrap",
    }}>{label}</span>
  );
}

/* ── Document Card ── */
function DocCard({doc,onRemove}) {
  const cat = CATEGORIES.find(c=>c.id===doc.category);
  return (
    <div style={{
      display:"flex",alignItems:"center",gap:10,
      background:"#fff",border:"1px solid #e2e8f5",
      borderRadius:10,padding:"9px 12px",
      animation:"slideIn .25s ease",boxShadow:"0 1px 4px rgba(0,0,0,.05)",
    }}>
      <div style={{
        width:32,height:32,borderRadius:8,flexShrink:0,
        background:(cat?.color||"#888")+"18",
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,
      }}>{cat?.icon||"📄"}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{
          fontSize:12,fontFamily:"'Barlow',sans-serif",fontWeight:600,
          color:"#1E3A5F",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
        }}>{doc.name}</div>
        <div style={{marginTop:3,display:"flex",alignItems:"center",gap:6}}>
          <Badge label={cat?.label||doc.category} color={cat?.color||"#888"}/>
          <span style={{fontSize:10,color:"#a0aec0",fontFamily:"'Barlow',sans-serif"}}>
            {(doc.size/1024).toFixed(0)} KB
          </span>
        </div>
      </div>
      <button onClick={()=>onRemove(doc.id)} style={{
        background:"none",border:"none",cursor:"pointer",
        color:"#cbd5e0",padding:4,borderRadius:4,fontSize:14,transition:"color .15s",
      }}
        onMouseEnter={e=>e.currentTarget.style.color="#e53e3e"}
        onMouseLeave={e=>e.currentTarget.style.color="#cbd5e0"}
      >✕</button>
    </div>
  );
}

/* ── Chat Message ── */
function Message({msg}) {
  const isUser = msg.role==="user";
  return (
    <div style={{
      display:"flex",justifyContent:isUser?"flex-end":"flex-start",
      marginBottom:14,animation:"fadeUp .3s ease",
    }}>
      {!isUser&&(
        <div style={{
          width:32,height:32,borderRadius:"50%",flexShrink:0,
          background:"linear-gradient(135deg,#1E3A5F,#F97316)",
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:11,fontWeight:700,color:"#fff",
          fontFamily:"'Barlow',sans-serif",marginRight:9,marginTop:2,
          boxShadow:"0 2px 8px rgba(249,115,22,.3)",
        }}>SM</div>
      )}
      <div style={{
        maxWidth:"74%",padding:"11px 15px",
        borderRadius:isUser?"16px 16px 3px 16px":"3px 16px 16px 16px",
        background:isUser?"linear-gradient(135deg,#1E3A5F,#0f2040)":"#FFFFFF",
        color:isUser?"#fff":"#1a2a3a",
        fontSize:13.5,lineHeight:1.7,
        boxShadow:isUser?"0 2px 10px rgba(30,58,95,.25)":"0 2px 10px rgba(0,0,0,.07)",
        border:isUser?"none":"1px solid #e8edf5",
        fontFamily:"'Lora',serif",whiteSpace:"pre-wrap",
      }}>
        {msg.typing ? <TypingDots/> : msg.content}
        {msg.sources&&msg.sources.length>0&&(
          <div style={{marginTop:10,paddingTop:8,borderTop:"1px solid #e8edf5",display:"flex",flexWrap:"wrap",gap:5}}>
            <span style={{fontSize:10,color:"#a0aec0",fontFamily:"'Barlow',sans-serif",fontWeight:600}}>SOURCES:</span>
            {msg.sources.map((s,i)=>(
              <span key={i} style={{
                fontSize:10,background:"#f0f4fa",border:"1px solid #dde6f5",
                borderRadius:4,padding:"1px 6px",color:"#4a6fa5",fontFamily:"'Barlow',sans-serif",
              }}>{s}</span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [docs,        setDocs]        = useState([]);
  const [messages,    setMessages]    = useState([{role:"assistant",content:WELCOME}]);
  const [input,       setInput]       = useState("");
  const [loading,     setLoading]     = useState(false);
  const [uploadCat,   setUploadCat]   = useState("hr");
  const [dragOver,    setDragOver]    = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const bottomRef    = useRef(null);
  const fileInputRef = useRef(null);
  const textareaRef  = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);

  const toBase64 = file => new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=()=>rej(new Error("Read failed"));
    r.readAsDataURL(file);
  });

  const processFiles = async files => {
    const pdfs = Array.from(files).filter(f=>f.type==="application/pdf");
    if(!pdfs.length) return;
    for(const file of pdfs){
      try{
        const base64 = await toBase64(file);
        setDocs(prev=>[...prev,{
          id:Date.now()+Math.random(),
          name:file.name.replace(/\.pdf$/i,""),
          category:uploadCat,
          size:file.size,
          base64,
        }]);
      }catch(e){ console.error(e); }
    }
  };

  const handleDrop = useCallback(async e=>{
    e.preventDefault(); setDragOver(false);
    await processFiles(e.dataTransfer.files);
  },[uploadCat]);

  const removeDoc = id => setDocs(prev=>prev.filter(d=>d.id!==id));

  const sendMessage = async () => {
    const text = input.trim();
    if(!text||loading) return;
    setInput(""); setLoading(true);
    if(textareaRef.current) textareaRef.current.style.height="auto";

    const userMsg = {role:"user",content:text};
    const history = [...messages,userMsg];
    setMessages([...history,{role:"assistant",typing:true}]);

    try{
      const docBlocks = docs.map(doc=>({
        type:"document",
        source:{type:"base64",media_type:"application/pdf",data:doc.base64},
        title:doc.name,
      }));

      const userContent = docs.length>0
        ? [...docBlocks,{type:"text",text}]
        : [{type:"text",text}];

      const apiMessages=[];
      for(let i=0;i<history.length-1;i++)
        apiMessages.push({role:history[i].role,content:history[i].content});
      apiMessages.push({role:"user",content:userContent});

      const noDocsNote = docs.length===0
        ? "\n\nNOTE: No documents uploaded. Tell user to upload policy PDFs. You may still answer general HR questions in the meantime."
        : `\n\nDocuments provided: ${docs.map(d=>d.name).join(", ")}`;

      /* ── Calls your own /api/chat proxy — key stays on server ── */
      const res = await fetch("/api/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:SYSTEM_PROMPT+noDocsNote,
          messages:apiMessages,
        }),
      });

      const data = await res.json();
      if(data.error) throw new Error(data.error);
      const reply = data.content?.map(b=>b.text||"").join("")||"Sorry, I couldn't generate a response.";
      const mentioned = docs.filter(d=>reply.toLowerCase().includes(d.name.toLowerCase().split(" ")[0])).map(d=>d.name);
      setMessages([...history,{role:"assistant",content:reply,sources:mentioned}]);
    }catch(err){
      setMessages([...history,{role:"assistant",content:`⚠️ Error: ${err.message||"Connection failed. Please try again."}`}]);
    }finally{
      setLoading(false);
    }
  };

  const totalDocs = docs.length;
  const docsByCategory = id => docs.filter(d=>d.category===id);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>

      {/* ── Header ── */}
      <div style={{
        height:54,background:"#0a1628",flexShrink:0,
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"0 20px",borderBottom:"1px solid #1a3050",
        boxShadow:"0 2px 16px rgba(0,0,0,.3)",
      }}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>setSidebarOpen(p=>!p)} style={{
            background:"rgba(255,255,255,.07)",border:"1px solid #1e3a5f",
            borderRadius:7,color:"#7a9cc5",cursor:"pointer",
            width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,
          }}>☰</button>
          <div style={{
            width:32,height:32,borderRadius:8,
            background:"linear-gradient(135deg,#F97316,#ea580c)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontWeight:800,fontSize:13,color:"#fff",
            boxShadow:"0 2px 10px rgba(249,115,22,.4)",
          }}>SM</div>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:"#fff"}}>Spark Minda</div>
            <div style={{fontSize:10,color:"#F97316",fontWeight:600,letterSpacing:1.5,textTransform:"uppercase"}}>
              Policy Assistant · RAG
            </div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {totalDocs>0&&(
            <div style={{
              display:"flex",alignItems:"center",gap:6,
              background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.3)",
              borderRadius:20,padding:"4px 12px",
            }}>
              <div style={{width:6,height:6,borderRadius:"50%",background:"#10B981",animation:"pulse 2s infinite"}}/>
              <span style={{fontSize:11,color:"#10B981",fontWeight:600}}>
                {totalDocs} doc{totalDocs!==1?"s":""} loaded
              </span>
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 6px #22c55e"}}/>
            <span style={{fontSize:11,color:"#4a7fa5"}}>Online</span>
          </div>
        </div>
      </div>

      {/* ── Body ── */}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>

        {/* Sidebar */}
        {sidebarOpen&&(
          <div style={{
            width:290,flexShrink:0,background:"#0d1f36",
            borderRight:"1px solid #1a3050",display:"flex",flexDirection:"column",overflow:"hidden",
          }}>
            <div style={{padding:"16px 16px 10px",borderBottom:"1px solid #1a3050"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#4a7fa5",letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>
                Policy Documents
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
                {CATEGORIES.map(cat=>(
                  <button key={cat.id} className={`cat-tab${uploadCat===cat.id?" active":""}`}
                    onClick={()=>setUploadCat(cat.id)}
                    style={{
                      padding:"5px 10px",borderRadius:6,cursor:"pointer",
                      border:"1px solid #1e3a5f",background:"transparent",
                      color:"#7a9cc5",fontSize:11,fontWeight:600,fontFamily:"'Barlow',sans-serif",
                    }}>
                    {cat.icon} {cat.label}
                  </button>
                ))}
              </div>

              <div className="upload-zone"
                onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                onDragLeave={()=>setDragOver(false)}
                onDrop={handleDrop}
                onClick={()=>fileInputRef.current?.click()}
                style={{
                  border:`2px dashed ${dragOver?"#F97316":"#1e3a5f"}`,
                  borderRadius:10,padding:"16px 12px",textAlign:"center",
                  cursor:"pointer",transition:"all .2s",
                  background:dragOver?"rgba(249,115,22,.07)":"rgba(255,255,255,.02)",
                }}>
                <div style={{fontSize:22,marginBottom:6}}>📂</div>
                <div style={{fontSize:12,color:"#7a9cc5",fontWeight:600,marginBottom:2}}>
                  Drop PDFs here or click to browse
                </div>
                <div style={{fontSize:10,color:"#3a5a80"}}>
                  Category: <span style={{color:CATEGORIES.find(c=>c.id===uploadCat)?.color}}>
                    {CATEGORIES.find(c=>c.id===uploadCat)?.label}
                  </span>
                </div>
              </div>
              <input ref={fileInputRef} type="file" accept=".pdf" multiple
                style={{display:"none"}} onChange={e=>processFiles(e.target.files)}/>
            </div>

            <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
              {totalDocs===0?(
                <div style={{textAlign:"center",padding:"30px 0",color:"#2d4a70"}}>
                  <div style={{fontSize:28,marginBottom:8}}>📋</div>
                  <div style={{fontSize:12,fontWeight:500}}>No documents uploaded yet</div>
                  <div style={{fontSize:11,marginTop:4,color:"#1e3550"}}>
                    Upload PDFs to enable<br/>document-based answers
                  </div>
                </div>
              ):(
                CATEGORIES.map(cat=>{
                  const catDocs=docsByCategory(cat.id);
                  if(!catDocs.length) return null;
                  return (
                    <div key={cat.id} style={{marginBottom:16}}>
                      <div style={{
                        fontSize:10,fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",
                        color:cat.color,marginBottom:7,display:"flex",alignItems:"center",gap:5,
                      }}>
                        {cat.icon} {cat.label}
                        <span style={{background:cat.color+"22",color:cat.color,borderRadius:10,padding:"0 6px",fontSize:9}}>
                          {catDocs.length}
                        </span>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:6}}>
                        {catDocs.map(doc=><DocCard key={doc.id} doc={doc} onRemove={removeDoc}/>)}
                      </div>
                    </div>
                  );
                })
              )}
            </div>

            <div style={{padding:"10px 16px",borderTop:"1px solid #1a3050",fontSize:10,color:"#2d4a70",textAlign:"center"}}>
              PDFs processed locally · Never stored externally
            </div>
          </div>
        )}

        {/* Chat Panel */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"#f0f4fa"}}>
          {totalDocs===0&&(
            <div style={{
              background:"linear-gradient(90deg,#1E3A5F,#0f2040)",
              padding:"10px 20px",display:"flex",alignItems:"center",gap:10,flexShrink:0,
            }}>
              <span style={{fontSize:14}}>💡</span>
              <span style={{fontSize:12,color:"#a0c4e8",fontWeight:500}}>
                Upload policy PDFs in the left panel to enable document-grounded answers.
              </span>
            </div>
          )}

          <div style={{flex:1,overflowY:"auto",padding:"20px 20px 10px"}}>
            {messages.map((msg,i)=><Message key={i} msg={msg}/>)}
            <div ref={bottomRef}/>
          </div>

          <div style={{
            padding:"12px 18px 16px",background:"#fff",
            borderTop:"1px solid #dde6f5",boxShadow:"0 -3px 16px rgba(0,0,0,.05)",flexShrink:0,
          }}>
            <div style={{
              display:"flex",gap:10,alignItems:"flex-end",
              background:"#f5f8ff",borderRadius:14,
              padding:"10px 12px 10px 16px",border:"1.5px solid #d4dff0",
            }}>
              <textarea
                ref={textareaRef}
                value={input}
                onChange={e=>{
                  setInput(e.target.value);
                  e.target.style.height="auto";
                  e.target.style.height=Math.min(e.target.scrollHeight,110)+"px";
                }}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}
                placeholder={totalDocs>0
                  ?`Ask about your ${totalDocs} uploaded policy document${totalDocs>1?"s":""}…`
                  :"Ask a policy question…"}
                disabled={loading}
                rows={1}
                style={{
                  flex:1,background:"transparent",border:"none",resize:"none",
                  fontFamily:"'Lora',serif",fontSize:14,color:"#1a2a3a",
                  lineHeight:1.55,minHeight:24,maxHeight:110,overflowY:"auto",
                }}
              />
              <button className="send-btn" onClick={sendMessage}
                disabled={loading||!input.trim()}
                style={{
                  width:36,height:36,borderRadius:9,border:"none",
                  background:"linear-gradient(135deg,#F97316,#ea580c)",
                  color:"#fff",cursor:"pointer",flexShrink:0,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  boxShadow:"0 2px 10px rgba(249,115,22,.35)",transition:"all .2s",
                }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
            <div style={{textAlign:"center",fontSize:10,color:"#b0bdd5",marginTop:7,fontFamily:"'Barlow',sans-serif"}}>
              {totalDocs>0
                ?`Searching across ${totalDocs} document${totalDocs>1?"s":""} · Answers grounded in your uploaded PDFs`
                :"Answers based on Spark Minda policies · Contact HR for complex matters"}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
